---
# ═══════════════════════════════════════
#  ShopEcom App Deployment
# ═══════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopecom
  labels:
    app: shopecom
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopecom
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # zero downtime
  template:
    metadata:
      labels:
        app: shopecom
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '8080'
        prometheus.io/path: '/actuator/prometheus'
    spec:
      containers:
        - name: shopecom
          image: YOUR_DOCKERHUB_USERNAME/shopecom:IMAGE_TAG_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: mysql-service
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: ecomerce
            - name: DB_USERNAME
              value: root
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shopecom-secrets
                  key: DB_PASSWORD
            - name: REDIS_HOST
              value: redis-service
            - name: REDIS_PORT
              value: "6379"
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: shopecom-secrets
                  key: MAIL_USERNAME
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shopecom-secrets
                  key: MAIL_PASSWORD
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: shopecom-secrets
                  key: GROQ_API_KEY
            - name: AWS_REGION
              value: ap-south-1
          resources:
            requests:
              cpu: '250m'
              memory: '512Mi'
            limits:
              cpu: '1000m'
              memory: '1Gi'
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
---
# ═══════════════════════════════════════
#  Service — LoadBalancer
# ═══════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: shopecom-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  type: LoadBalancer
  selector:
    app: shopecom
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
# ═══════════════════════════════════════
#  HPA — Autoscaling
# ═══════════════════════════════════════
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shopecom-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shopecom
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
---
# ═══════════════════════════════════════
#  Pod Disruption Budget — fault tolerance
# ═══════════════════════════════════════
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: shopecom-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: shopecom
